{% extends 'base.html' %}
{% block content %}
<h1>Вход</h1>
<form method="post" action="{{ url_for('login') }}" class="form">
  <label>Логин <input type="text" name="username" required></label>
  <label>Пароль <input type="password" name="password" required></label>
  <button type="submit">Войти</button>
</form>
<p>Нет аккаунта? <a href="{{ url_for('register_form') }}">Зарегистрируйтесь</a></p>
{% endblock %}
